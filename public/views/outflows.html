<!-- Outflows Page -->
<div id="outflows-page" class="tab-content" style="display: none;">
    <div class="grid-layout">
        <!-- Registration Form -->
        <div class="glass-card" style="padding: 1.5rem;">
            <h3 style="color: var(--outflow-color); margin-bottom: 1.5rem; font-size: 1.3rem;">Cadastrar
                Despesa</h3>
            <form id="outflow-form">
                <div class="input-group">
                    <label for="out-amount">Valor (R$)</label>
                    <input type="number" id="out-amount" step="0.01" required placeholder="0,00">
                </div>
                <div class="input-group">
                    <label for="out-category">Categoria</label>
                    <select id="out-category" required>
                        <option value="">Selecione...</option>
                        <option value="Transporte">Contrato de Transporte</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Reembolso">Reembolso</option>
                        <option value="Inscrições">Inscrições / Taxas</option>
                        <option value="Materiais">Materiais / Compras</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="out-date">Data do Pagamento</label>
                    <input type="date" id="out-date" required>
                </div>
                <div class="input-group">
                    <label for="out-receipt">Comprovante (Opcional)</label>
                    <input type="file" id="out-receipt" accept="image/*,.pdf">
                </div>
                <div class="input-group">
                    <label for="out-desc">Descrição / Observações</label>
                    <textarea id="out-desc"
                        style="width: 100%; min-height: 60px; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 4px;"></textarea>
                </div>
                <button type="submit" class="btn-primary"
                    style="background: var(--outflow-color); color: white; font-weight: 700;">Salvar
                    Despesa</button>
            </form>
        </div>

        <!-- Data Table -->
        <div class="glass-card table-container" style="padding: 0;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                <h4 style="margin: 0;">Histórico de Despesas</h4>
            </div>
            <div class="table-responsive">
                <table id="outflows-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Categoria</th>
                            <th>Valor</th>
                            <th>Comprovante</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="outflows-body">
                        <!-- Populated by JS -->
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem;">Carregando
                                despesas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
