<!-- Dashboard Page -->
<div id="dashboard-page" class="tab-content">
    <div class="stats-grid">
        <div class="glass-card stat-card">
            <span class="stat-label">Total em Caixa (Ano)</span>
            <h3 id="stat-total-cash">R$ 0,00</h3>
        </div>
        <div class="glass-card stat-card">
            <span class="stat-label">Direção</span>
            <h3 id="stat-direcao">R$ 0,00</h3>
        </div>
        <div class="glass-card stat-card">
            <span class="stat-label">Desbravadores</span>
            <h3 id="stat-desbravadores">R$ 0,00</h3>
        </div>
        <div class="glass-card stat-card">
            <span class="stat-label">Eventos</span>
            <h3 id="stat-eventos">R$ 0,00</h3>
        </div>
        <div class="glass-card stat-card outflow-theme" id="stat-outflows-card" style="display: none;">
            <span class="stat-label">Total em Despesas</span>
            <h3 id="stat-total-outflows">R$ 0,00</h3>
        </div>
        <!-- PWA Install Card (Mobile Only) -->
        <div class="glass-card stat-card" id="pwa-install-card"
            style="display: none; background: var(--accent-color); color: white; cursor: pointer; border: none; align-items: center; justify-content: center; text-align: center;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="32" height="32"
                    fill="white">
                    <path
                        d="M144 128C144 92.7 172.7 64 208 64L432 64C467.3 64 496 92.7 496 128L496 512C496 547.3 467.3 576 432 576L208 576C172.7 576 144 547.3 144 512L144 128zM208 128L208 432L432 432L432 128L208 128zM320 536C337.7 536 352 521.7 352 504C352 486.3 337.7 472 320 472C302.3 472 288 486.3 288 504C288 521.7 302.3 536 320 536z" />
                </svg>
                <span style="font-weight: 700; font-size: 1.1rem;">Baixar Aplicativo</span>
                <span style="font-size: 0.8rem; opacity: 0.9;">Instale para acesso rápido</span>
            </div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="glass-card chart-container">
            <h4>Composição da Receita</h4>
            <canvas id="pieChart"></canvas>
        </div>
        <div class="glass-card chart-container">
            <h4>Receita Mensal</h4>
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>
