<!-- Sales Page -->
<div id="sales-page" class="tab-content" style="display: none;">
    <div class="grid-layout">
        <!-- Registration Form -->
        <div class="glass-card" style="padding: 1.5rem;">
            <h3 style="color: var(--outflow-color); margin-bottom: 1.5rem; font-size: 1.3rem;">Cadastrar
                Venda</h3>
            <form id="sales-form">
                <div class="input-group">
                    <label for="sale-event-name">Nome do Evento</label>
                    <input type="text" id="sale-event-name" required placeholder="Ex: Açaí">
                </div>
                <div class="input-group">
                    <label for="sale-amount">Valor Arrecadado (R$)</label>
                    <input type="number" id="sale-amount" step="0.01" required placeholder="0,00">
                </div>
                <div class="input-group">
                    <label for="sale-date">Data</label>
                    <input type="date" id="sale-date" required>
                </div>
                <div class="input-group">
                    <label for="sale-receipt">Comprovante / Recibo (Opcional)</label>
                    <input type="file" id="sale-receipt" accept="image/*, application/pdf">
                </div>
                <div class="input-group">
                    <label for="sale-desc">Descrição / Detalhes</label>
                    <textarea id="sale-desc"
                        style="width: 100%; min-height: 60px; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 4px;"
                        placeholder="Opcional..."></textarea>
                </div>
                <button type="submit" class="btn-primary"
                    style="width: 100%; background: var(--outflow-color); color: white; font-weight: 700;">Salvar
                    Venda</button>
            </form>
        </div>

        <!-- Sales History -->
        <div class="glass-card table-container" style="padding: 0;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                <h4 style="margin: 0;">Histórico de Vendas</h4>
            </div>
            <div class="table-responsive">
                <table id="sales-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Evento / Origem</th>
                            <th>Valor</th>
                            <th>Comprovante</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="sales-body">
                        <!-- Populated by JS -->
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem;">Nenhuma venda
                                registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
