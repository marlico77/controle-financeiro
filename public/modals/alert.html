<!-- Custom Alert Modal -->
<div id="alert-modal" class="modal" style="z-index: 10003;">
    <div class="modal-content glass-card animate-fade-in" style="max-width: 400px; text-align: center;">
        <div id="alert-icon" style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
        <h2 id="alert-title" style="margin-bottom: 1rem; color: var(--accent-color);">Aviso</h2>
        <p id="alert-message"
            style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 2rem; line-height: 1.5;"></p>
        <div style="display: flex; flex-direction: column; gap: 0.8rem;">
            <button id="alert-ok" class="btn-primary">Entendido</button>
        </div>
    </div>
</div>
