<!-- Add Participants Modal -->
<div id="event-participants-modal" class="modal">
    <div class="glass-card modal-content" style="max-width: 500px;">
        <span class="close-modal">&times;</span>
        <h3 style="color: var(--accent-color); margin-bottom: 0.5rem;">Adicionar Membros ao Evento</h3>
        <p style="margin-bottom: 1.5rem; color: var(--text-dim); font-size: 0.9rem;">Selecione os novos membros que
            deseja incluir neste evento.</p>

        <div class="input-group" style="margin-bottom: 1rem;">
            <input type="text" id="add-member-search" placeholder="Pesquisar membro..."
                style="width: 100%; padding: 0.6rem; background: white; border: 1px solid var(--border-color); border-radius: 4px; color: black; font-size: 0.9rem;">
        </div>

        <div id="add-participants-list" class="checklist-container"
            style="max-height: 350px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 0.5rem; margin-bottom: 1.5rem;">
            <!-- Populated by JS -->
        </div>

        <button id="save-new-participants-btn" class="btn-primary"
            style="width: 100%; background: black; color: white; padding: 1rem; font-weight: 700;">Salvar
            Selecionados</button>
    </div>
</div>
