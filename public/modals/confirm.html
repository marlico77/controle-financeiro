<!-- Custom Confirm Modal -->
<div id="confirm-modal" class="modal">
    <div class="glass-card modal-content" style="max-width: 400px; text-align: center;">
        <h3 id="confirm-title" style="color: var(--accent-color); margin-bottom: 1rem;">Confirmar Ação</h3>
        <p id="confirm-message" style="margin-bottom: 2rem; line-height: 1.5; color: var(--text-dim);"></p>
        <div style="display: flex; gap: 1rem;">
            <button id="confirm-yes" class="btn-primary"
                style="flex: 1; background: var(--accent-color);">Confirmar</button>
            <button id="confirm-no" class="btn-secondary"
                style="flex: 1; background: var(--border-color); color: var(--text-color); border: none; padding: 0.8rem; border-radius: 6px; cursor: pointer;">Cancelar</button>
        </div>
    </div>
</div>
