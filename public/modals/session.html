<!-- Session Conflict Modal -->
<div id="session-modal" class="modal" style="z-index: 10002;">
    <div class="modal-content glass-card animate-fade-in" style="max-width: 400px; text-align: center;">
        <div style="margin-bottom: 1.5rem; color: var(--accent-color); display: flex; justify-content: center;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="60" height="60"
                fill="currentColor">
                <path
                    d="M208 64C172.7 64 144 92.7 144 128L144 512C144 547.3 172.7 576 208 576L432 576C467.3 576 496 547.3 496 512L496 128C496 92.7 467.3 64 432 64L208 64zM280 480L360 480C373.3 480 384 490.7 384 504C384 517.3 373.3 528 360 528L280 528C266.7 528 256 517.3 256 504C256 490.7 266.7 480 280 480z" />
            </svg>
        </div>
        <h2 style="margin-bottom: 1rem; color: var(--accent-color);">Sessão Ativa</h2>
        <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 2rem;">
            Já existe um dispositivo conectado a esta conta. Deseja encerrar a outra sessão para entrar aqui?
        </p>
        <div style="display: flex; flex-direction: column; gap: 0.8rem;">
            <button id="confirm-force-login" class="btn-primary">Derrubar Sessão e Entrar</button>
            <button onclick="document.getElementById('session-modal').style.display='none'"
                class="btn-text">Cancelar</button>
        </div>
    </div>
</div>
